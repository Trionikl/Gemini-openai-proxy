<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a051b"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e113a"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Задний фон -->
  <rect width="100%" height="100%" fill="url(#bg-grad)"/>

  <!-- Космическое звездное поле -->
  <g fill="#ffffff">
    <circle cx="100" cy="80" r="1" opacity="0.6"/>
    <circle cx="250" cy="120" r="1.5" opacity="0.8"/>
    <circle cx="400" cy="60" r="2" opacity="0.5"/>
    <circle cx="550" cy="180" r="1" opacity="0.9"/>
    <circle cx="700" cy="100" r="1.5" opacity="0.4"/>
    <circle cx="850" cy="150" r="2.5" opacity="0.7"/>
    <circle cx="1000" cy="70" r="1" opacity="0.6"/>
    <circle cx="1150" cy="220" r="1.5" opacity="0.5"/>
    <circle cx="150" cy="300" r="2" opacity="0.8"/>
    <circle cx="300" cy="250" r="1" opacity="0.4"/>
    <circle cx="500" cy="320" r="1.5" opacity="0.9"/>
    <circle cx="650" cy="280" r="2.5" opacity="0.6"/>
    <circle cx="800" cy="340" r="1" opacity="0.5"/>
    <circle cx="950" cy="270" r="1.5" opacity="0.7"/>
    <circle cx="1100" cy="310" r="2" opacity="0.4"/>
  </g>

  <!-- Созвездия (линии связи) -->
  <path d="M 100 80 L 250 120 L 300 250 M 400 60 L 550 180 M 850 150 L 950 270 L 1100 310" stroke="#475569" stroke-width="0.5" fill="none" opacity="0.5"/>

  <!-- Туманности -->
  <circle cx="1000" cy="200" r="150" fill="#a855f7" opacity="0.15" filter="url(#glow)"/>
  <circle cx="200" cy="250" r="120" fill="#0ea5e9" opacity="0.1" filter="url(#glow)"/>

  <!-- Графика логотипа (орбиты и ядро) -->
  <g transform="translate(1000, 180)" filter="url(#glow)">
    <ellipse cx="0" cy="0" rx="90" ry="25" fill="none" stroke="#38bdf8" stroke-width="2" transform="rotate(-15)" opacity="0.8"/>
    <ellipse cx="0" cy="0" rx="70" ry="18" fill="none" stroke="#c084fc" stroke-width="1.5" transform="rotate(25)" opacity="0.6"/>
    <polygon points="0,-15 4,-4 15,0 4,4 0,15 -4,4 -15,0 -4,-4" fill="#ffffff"/>
  </g>

  <!-- Текстовое наполнение -->
  <text x="100" y="170" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="64" fill="url(#text-grad)" letter-spacing="2">GEMINI-OPENAI-PROXY</text>
  <text x="105" y="220" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="20" fill="#94a3b8" letter-spacing="1">Интеллектуальный мост для ИИ-агентов</text>
  <text x="105" y="250" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="14" fill="#64748b">Решение проблемы skip_thought_signature и лимитов контекста</text>
</svg>